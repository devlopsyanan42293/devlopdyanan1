<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuaPaste — Bagikan Kode Lua</title>
  <meta name="description" content="Platform berbagi kode Lua dengan syntax highlighting. Gratis, tanpa login, tanpa database.">
  <meta property="og:title" content="LuaPaste">
  <meta property="og:description" content="Bagikan kode Lua dengan mudah">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/lua.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080b10;
      --surface: #0f1219;
      --surface2: #161c27;
      --surface3: #1c2333;
      --border: #1e2535;
      --border2: #2a3350;
      --accent: #00e676;
      --accent-dim: rgba(0,230,118,0.12);
      --accent-glow: rgba(0,230,118,0.25);
      --blue: #00b0ff;
      --blue-dim: rgba(0,176,255,0.1);
      --orange: #ff6d00;
      --red: #ff4757;
      --text: #cdd6f4;
      --muted: #7d8bb5;
      --dim: #3d4a6b;
      --r: 8px;
    }

    html { font-size: 14px; scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(8,11,16,0.92);
      z-index: 100;
      backdrop-filter: blur(16px);
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 17px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 3px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      background: var(--accent);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-size: 14px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── BUTTONS ── */
    button {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      border: none;
      outline: none;
      transition: all 0.15s ease;
      letter-spacing: 0.3px;
    }

    .btn {
      padding: 7px 14px;
      border-radius: var(--r);
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-weight: 500;
      white-space: nowrap;
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border2);
    }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: var(--dim); }

    .btn-primary {
      background: var(--accent);
      color: #000;
      border: 1px solid var(--accent);
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .btn-primary:hover { background: #00c05a; box-shadow: 0 0 24px var(--accent-glow); }
    .btn-primary:active { transform: scale(0.98); }

    .btn-blue {
      background: var(--blue-dim);
      color: var(--blue);
      border: 1px solid rgba(0,176,255,0.25);
    }
    .btn-blue:hover { background: rgba(0,176,255,0.18); }

    .btn-red {
      background: transparent;
      color: var(--red);
      border: 1px solid rgba(255,71,87,0.3);
    }
    .btn-red:hover { background: rgba(255,71,87,0.08); }

    /* ── MAIN ── */
    main {
      flex: 1;
      max-width: 1120px;
      width: 100%;
      margin: 0 auto;
      padding: 28px 24px 40px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── BANNER ── */
    .banner {
      background: var(--blue-dim);
      border: 1px solid rgba(0,176,255,0.2);
      border-radius: var(--r);
      padding: 11px 16px;
      font-size: 12px;
      color: var(--blue);
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      animation: slideDown 0.3s ease;
    }
    .banner.visible { display: flex; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── TITLE BAR ── */
    .title-bar {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .title-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 10px 16px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .title-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .title-input::placeholder { color: var(--dim); }

    .lang-pill {
      background: var(--accent-dim);
      border: 1px solid rgba(0,230,118,0.25);
      color: var(--accent);
      padding: 8px 14px;
      border-radius: var(--r);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    /* ── EDITOR WRAPPER ── */
    .editor-card {
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow: hidden;
      background: var(--surface);
      transition: border-color 0.2s;
    }
    .editor-card:focus-within { border-color: var(--border2); }

    .editor-titlebar {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 9px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }

    .traffic-lights { display: flex; gap: 6px; }
    .tl {
      width: 11px;
      height: 11px;
      border-radius: 50%;
    }
    .tl-r { background: #ff5f57; }
    .tl-y { background: #febc2e; }
    .tl-g { background: #28c840; }

    .editor-filename {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mode-chip {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--accent-dim);
      color: var(--accent);
    }
    .mode-chip.view { background: var(--blue-dim); color: var(--blue); }

    .editor-body {
      display: flex;
      min-height: 420px;
    }

    /* Line numbers */
    .gutter {
      padding: 16px 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      text-align: right;
      user-select: none;
      color: var(--dim);
      font-size: 12px;
      line-height: 1.65;
      min-width: 52px;
      overflow: hidden;
    }
    .gutter span { display: block; padding: 0 14px; }

    /* Textarea */
    #code-editor {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.65;
      padding: 16px 18px;
      tab-size: 4;
      caret-color: var(--accent);
      min-height: 420px;
    }
    #code-editor::selection { background: rgba(0,230,118,0.18); }
    #code-editor::placeholder { color: var(--dim); }

    /* Highlight view */
    .hl-view {
      flex: 1;
      display: none;
      padding: 16px 18px;
      overflow-x: auto;
      min-height: 420px;
    }
    .hl-view pre { margin: 0; background: transparent !important; }
    .hl-view code {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 13px;
      line-height: 1.65;
      background: transparent !important;
      padding: 0 !important;
    }

    /* ── STATS ── */
    .stats {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 11px;
      color: var(--dim);
    }
    .stat span { color: var(--muted); margin-left: 4px; }
    .stat-dot { color: var(--blue); }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tb-left { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; }
    .tb-right { display: flex; gap: 8px; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--surface2);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 11px 20px;
      border-radius: var(--r);
      font-size: 12px;
      font-weight: 500;
      transform: translateY(16px);
      opacity: 0;
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 999;
      pointer-events: none;
      letter-spacing: 0.3px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 16px 28px;
      font-size: 11px;
      color: var(--dim);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--dim); }

    /* ── GRID BG ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,230,118,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,230,118,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    header, main, footer { position: relative; z-index: 1; }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      main { padding: 20px 16px 32px; }
      header { padding: 0 16px; }
      .logo span { display: none; }
      .toolbar { flex-direction: column; }
      .tb-left, .tb-right { width: 100%; }
    }
  </style>
</head>
<body>

<!-- ─── HEADER ─── -->
<header>
  <a href="/" class="logo" onclick="newPaste(); return false;">
    <div class="logo-mark">L</div>
    <span>LUAPASTE</span>
  </a>
  <div class="header-right">
    <a href="https://www.lua.org/docs.html" target="_blank" rel="noopener" style="text-decoration:none">
      <button class="btn btn-ghost">📚 Docs Lua</button>
    </a>
  </div>
</header>

<!-- ─── MAIN ─── -->
<main>

  <!-- Banner: sedang melihat paste -->
  <div class="banner" id="banner">
    <span>🔗 Kamu sedang melihat paste yang dibagikan</span>
    <button class="btn btn-blue" onclick="newPaste()">+ Buat Paste Baru</button>
  </div>

  <!-- Title bar -->
  <div class="title-bar">
    <input class="title-input" id="paste-title" type="text"
      placeholder="Judul paste (opsional)..." maxlength="80">
    <div class="lang-pill">LUA</div>
  </div>

  <!-- Editor card -->
  <div class="editor-card">
    <!-- Titlebar -->
    <div class="editor-titlebar">
      <div class="traffic-lights">
        <div class="tl tl-r"></div>
        <div class="tl tl-y"></div>
        <div class="tl tl-g"></div>
      </div>
      <div class="editor-filename" id="fname">untitled.lua</div>
      <div class="mode-chip" id="mode-chip">EDIT</div>
    </div>

    <!-- Body -->
    <div class="editor-body">
      <!-- Gutter -->
      <div class="gutter" id="gutter"><span>1</span></div>

      <!-- Textarea -->
      <textarea id="code-editor" spellcheck="false" autocorrect="off"
        autocapitalize="off" autocomplete="off"
        placeholder="-- Tulis kode Lua di sini...&#10;&#10;-- Contoh:&#10;local function sapa(nama)&#10;    print('Halo, ' .. nama .. '!')&#10;end&#10;&#10;sapa('Dunia')"></textarea>

      <!-- Highlighted preview -->
      <div class="hl-view" id="hl-view">
        <pre><code class="language-lua" id="hl-code"></code></pre>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">baris <span id="s-lines">0</span></div>
    <div class="stat">karakter <span id="s-chars">0</span></div>
    <div class="stat">kata <span id="s-words">0</span></div>
    <div class="stat" id="s-readonly" style="display:none">
      <span class="stat-dot">● mode tampil</span>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="tb-left">
      <button class="btn btn-primary" id="share-btn" onclick="shareCode()">
        🔗 Bagikan
      </button>
      <button class="btn btn-ghost" onclick="copyCode()">
        📋 Salin Kode
      </button>
      <button class="btn btn-ghost" onclick="downloadCode()">
        ⬇ Unduh .lua
      </button>
    </div>
    <div class="tb-right">
      <button class="btn btn-blue" id="toggle-btn" onclick="toggleView()">
        👁 Pratinjau
      </button>
      <button class="btn btn-red" onclick="clearCode()">
        🗑 Hapus
      </button>
    </div>
  </div>

</main>

<!-- ─── FOOTER ─── -->
<footer>
  <span>LuaPaste — Kode disimpan di URL, tanpa server, tanpa database</span>
  <span>Deploy via <a href="https://vercel.com" target="_blank">Vercel</a> + <a href="https://github.com" target="_blank">GitHub</a></span>
</footer>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const editor   = document.getElementById('code-editor');
const gutter   = document.getElementById('gutter');
const hlView   = document.getElementById('hl-view');
const hlCode   = document.getElementById('hl-code');
const modeChip = document.getElementById('mode-chip');
const fname    = document.getElementById('fname');
const banner   = document.getElementById('banner');
const shareBtn = document.getElementById('share-btn');
const toggleBtn= document.getElementById('toggle-btn');
const titleIn  = document.getElementById('paste-title');

const sLines   = document.getElementById('s-lines');
const sChars   = document.getElementById('s-chars');
const sWords   = document.getElementById('s-words');
const sRO      = document.getElementById('s-readonly');

let isPreview = false;

// ── Update UI ──────────────────────────────────────
function refresh() {
  const lines = editor.value.split('\n');
  gutter.innerHTML = lines.map((_,i)=>`<span>${i+1}</span>`).join('');
  sLines.textContent = lines.length;
  sChars.textContent = editor.value.length;
  sWords.textContent = editor.value.trim() ? editor.value.trim().split(/\s+/).length : 0;

  const title = titleIn.value.trim();
  fname.textContent = title ? title.replace(/\.lua$/,'') + '.lua' : 'untitled.lua';
}

editor.addEventListener('input', refresh);
titleIn.addEventListener('input', refresh);

editor.addEventListener('scroll', () => {
  gutter.scrollTop = editor.scrollTop;
});

// Tab = 4 spaces
editor.addEventListener('keydown', e => {
  if (e.key !== 'Tab') return;
  e.preventDefault();
  const s = editor.selectionStart, en = editor.selectionEnd;
  editor.value = editor.value.slice(0,s) + '    ' + editor.value.slice(en);
  editor.selectionStart = editor.selectionEnd = s + 4;
  refresh();
});

// ── Toggle preview ─────────────────────────────────
function toggleView() {
  isPreview = !isPreview;
  if (isPreview) {
    hlCode.textContent = editor.value;
    hljs.highlightElement(hlCode);
    hlView.style.display = 'block';
    editor.style.display = 'none';
    gutter.style.display = 'none';
    modeChip.textContent = 'TAMPIL';
    modeChip.className = 'mode-chip view';
    toggleBtn.textContent = '✏ Edit';
  } else {
    hlView.style.display = 'none';
    editor.style.display = 'block';
    gutter.style.display = 'block';
    modeChip.textContent = 'EDIT';
    modeChip.className = 'mode-chip';
    toggleBtn.textContent = '👁 Pratinjau';
  }
}

// ── Share via URL hash ─────────────────────────────
function shareCode() {
  const code = editor.value.trim();
  if (!code) { toast('⚠ Tulis kode dulu!', '#ff6d00'); return; }

  const payload = JSON.stringify({
    t: titleIn.value.trim(),
    c: code,
    v: 1
  });
  const encoded = btoa(unescape(encodeURIComponent(payload)));
  const url = location.origin + location.pathname + '#' + encoded;

  navigator.clipboard.writeText(url)
    .then(() => {
      toast('✓ Link disalin ke clipboard!');
      history.pushState(null, '', '#' + encoded);
      shareBtn.textContent = '✓ Disalin!';
      setTimeout(() => shareBtn.textContent = '🔗 Bagikan', 2500);
    })
    .catch(() => {
      prompt('Salin link ini:', url);
    });
}

// ── Copy code ─────────────────────────────────────
function copyCode() {
  if (!editor.value.trim()) { toast('⚠ Tidak ada kode!', '#ff6d00'); return; }
  navigator.clipboard.writeText(editor.value).then(() => toast('✓ Kode disalin!'));
}

// ── Download ──────────────────────────────────────
function downloadCode() {
  if (!editor.value.trim()) { toast('⚠ Tidak ada kode!', '#ff6d00'); return; }
  const name = (titleIn.value.trim() || 'untitled').replace(/\.lua$/,'') + '.lua';
  const blob = new Blob([editor.value], {type:'text/plain'});
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob), download: name
  });
  a.click();
  URL.revokeObjectURL(a.href);
  toast('✓ Mengunduh ' + name);
}

// ── Clear ─────────────────────────────────────────
function clearCode() {
  if (!editor.value.trim() || confirm('Hapus semua kode?')) {
    editor.value = '';
    titleIn.value = '';
    refresh();
    history.pushState(null, '', location.pathname);
    if (isPreview) toggleView();
    banner.classList.remove('visible');
    sRO.style.display = 'none';
    toast('✓ Editor dikosongkan', '#ff6d00');
  }
}

// ── New paste ─────────────────────────────────────
function newPaste() {
  editor.value = '';
  titleIn.value = '';
  refresh();
  history.pushState(null, '', location.pathname);
  if (isPreview) toggleView();
  banner.classList.remove('visible');
  sRO.style.display = 'none';
  editor.focus();
}

// ── Load from hash ────────────────────────────────
function loadHash() {
  const hash = location.hash.slice(1);
  if (!hash) return;
  try {
    const data = JSON.parse(decodeURIComponent(escape(atob(hash))));
    if (!data.c) return;
    editor.value = data.c;
    if (data.t) titleIn.value = data.t;
    refresh();
    banner.classList.add('visible');
    sRO.style.display = 'flex';
    if (!isPreview) toggleView();
  } catch {
    // bad hash — silently ignore
  }
}

// ── Toast ─────────────────────────────────────────
function toast(msg, color = 'var(--accent)') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = color;
  el.style.color = color;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── Init ──────────────────────────────────────────
refresh();
loadHash();

window.addEventListener('popstate', () => {
  if (location.hash) loadHash();
  else newPaste();
});
</script>
</body>
</html>
